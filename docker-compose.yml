services:
  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      COOKIE_SECURE: "true"
      COOKIE_USE_HOST_PREFIX: "true"
      COOKIE_SAMESITE: "lax"
      CORS_ORIGIN: "https://${DOMAIN}"
      DB_PATH: "/app/data/quiz.db"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      AUTH_USER: ${AUTH_USER}
      AUTH_HASH: ${AUTH_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/build:/var/www/html:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
  caddy_data:
  caddy_config: